<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Note Mastery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Guitar Note Mastery</h1>
            <p>Listen. Play. Score.</p>
        </header>

        <div class="game-hud">
            <div class="hud-item">
                <span class="label">Score</span>
                <span id="score-display" class="value">0</span>
            </div>
            
            <div class="target-display">
                <div class="label">Target Note</div>
                <div id="target-note" class="large-note">--</div>
                <div id="timer-bar-container">
                    <div id="timer-bar"></div>
                </div>
                <div id="timer-text">10.0s</div>
            </div>

            <div class="hud-item">
                <span class="label">Round</span>
                <span id="round-display" class="value">1</span>
            </div>
        </div>

        <div class="tuner-feedback">
            <div class="detected-info">
                Detected: <span id="detected-note">--</span> 
                <span id="cents-deviation" class="cents">0 cents</span>
            </div>
            <div class="status-message" id="status-message">Press Start to Begin</div>
        </div>

        <div class="fretboard-container">
            <canvas id="fretboard-canvas" width="1000" height="300"></canvas>
        </div>

        <div class="controls">
            <button id="start-btn">Start Game / Enable Mic</button>
        </div>
    </div>

    <script src="fretboard.js"></script>
    <script src="audio.js"></script>
    <script src="ui.js"></script>
    <script src="game.js"></script>
</body>
</html>
