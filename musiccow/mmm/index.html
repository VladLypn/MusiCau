<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Music Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Web Audio Analyzer</h1>
        <h2>Note & Chord Recognition</h2>
    </header>

    <div class="container">
        <div class="controls">
            <button id="start-btn">Start Microphone</button>
            <p id="status-text">Ready to start</p>
        </div>

        <div class="card">
            <h3>Single Note Tuner</h3>
            <div id="note-display" class="display-primary">--</div>
            <div id="freq-display" class="display-secondary">0 Hz</div>
            
            <div class="meter-container">
                <div class="center-line"></div>
                <div id="tuner-needle" class="needle"></div>
            </div>
            <div id="cents-display" class="cents-text">0 cents</div>
        </div>

        <div class="card">
            <h3>Chord Detector</h3>
            <div id="chord-display" class="display-primary chord-text">--</div>
            <div id="chord-notes" class="display-secondary">Detected Notes: None</div>
        </div>

        <div class="card">
            <h3>Waveform</h3>
            <canvas id="visualizer"></canvas>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="app.js"></script>
</body>
</html>
